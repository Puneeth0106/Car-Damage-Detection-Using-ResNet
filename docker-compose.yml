services:

  # ── Backend: FastAPI + PyTorch ───────────────────────────────────────────────
  backend:
    build: ./fastapi-server
    # The model is NOT baked into the image.
    # It's mounted from the host at runtime → swap models without rebuilding.
    volumes:
      - ./model:/app/model:ro   # :ro = read-only (security best practice)
    # Only expose internally; the frontend (Nginx) proxies to it.
    # On AWS, port 8000 will NOT be open to the internet.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/hello"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend: React + Nginx ──────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "80:80"          # Only the frontend port is exposed to the internet
    depends_on:
      - backend

# ── How to run locally ────────────────────────────────────────────────────────
# docker compose up --build
# Open http://localhost
#
# How traffic flows:
#   Browser → :80 (Nginx) → /api/* → :8000 (FastAPI) → model → prediction
# ─────────────────────────────────────────────────────────────────────────────
