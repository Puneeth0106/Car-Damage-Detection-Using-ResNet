server {
    listen 80;

    # Serve React static files
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # Required for React Router (single-page app)
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → FastAPI container
    # "backend" is the service name in docker-compose.yml
    # Docker's internal DNS resolves it automatically — no hardcoded IPs needed
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;   # ML inference can be slow on first load
    }
}
